  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --ink3: #888880;
    --rule: #e0ddd6;

    --accent-light: #e8f0eb;
    --link: #1a3f5c;
    --max: 860px;
    --pad: clamp(1.5rem, 5vw, 3rem);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    background: var(--bg);

  }

    position: sticky;
    top: 0;

    border-bottom: 1px solid var(--rule);
  }

  .nav-inner {
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 var(--pad);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
  }

  .nav-name {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: 0.01em;
  }

  .nav-links {
    display: flex;
    gap: 1.75rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 13px;
    font-weight: 400;
    color: var(--ink2);
    text-decoration: none;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .nav-links a:hover { color: var(--accent); }

  /* ─── Main layout ────────────────────────────────────────────────── */
  main {
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 var(--pad);
  }

  section {
    padding: 4rem 0;
    border-bottom: 1px solid var(--rule);
  }

  section:last-child { border-bottom: none; }

  /* ─── Section headings ───────────────────────────────────────────── */
  .section-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 2.5rem;
  }

  h2 {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 3vw, 2rem);
    font-weight: 400;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 1rem;
  }

  h3 {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }

  /* ─── Hero ───────────────────────────────────────────────────────── */
  #hero {
    padding: 5rem 0 4rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3rem;
    align-items: start;
    border-bottom: 1px solid var(--rule);
  }

  .hero-text { max-width: 560px; }

  .hero-eyebrow {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .hero-name {
    font-family: var(--serif);
    font-size: clamp(2.4rem, 6vw, 3.4rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }

  .hero-bio {
    font-size: 15.5px;
    color: var(--ink2);
    line-height: 1.75;
    margin-bottom: 2rem;
  }

  .hero-bio a {
    color: var(--link);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .hero-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .hero-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--ink2);
    text-decoration: none;
    padding: 5px 12px;
    border: 1px solid var(--rule);
    border-radius: 40px;
    background: white;
    transition: all 0.15s;
  }

  .hero-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .hero-photo {
    width: 160px;
    height: 160px;
    border-radius: 4px;
    object-fit: cover;
    filter: grayscale(8%);
    flex-shrink: 0;
  }

  .hero-meta {
    margin-top: 1.5rem;
    font-size: 13px;
    color: var(--ink3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .news-item {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 1rem;
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--rule);
    font-size: 14.5px;

    font-size: 12px;
    color: var(--ink3);
    font-weight: 500;
    padding-top: 2px;
    white-space: nowrap;
  }

  .news-text { color: var(--ink2); line-height: 1.6; }

  .news-text a { color: var(--link); text-underline-offset: 3px; }

  .pub-group-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    padding-bottom: 0.75rem;

    margin-bottom: 1.5rem;
  }

    margin-bottom: 0.2rem;

    margin-bottom: 0.2rem;
  }

    background: var(--rule);
    border: 1px solid var(--rule);

    overflow: hidden;

    background: white;
    padding: 1rem 1.25rem;
  }

  .teaching-code {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
  }

    font-family: var(--serif);
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 0.15rem;

    font-size: 15px;
    color: var(--ink2);
    line-height: 1.75;
    margin-bottom: 2.5rem;

    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.75rem;

    font-size: 14.5px;
    color: var(--ink2);
    padding: 0.3rem 0;

    grid-template-columns: 52px 1fr;
    gap: 1rem;
    padding: 0.75rem 0;

    font-size: 14.5px;

    text-align: center;
    font-size: 12.5px;
    color: var(--ink3);

  @media (max-width: 600px) {
    #hero { grid-template-columns: 1fr; }
    .hero-photo { width: 120px; height: 120px; }
    .service-grid { grid-template-columns: 1fr; }
    .nav-links { gap: 1rem; }
  }

/** Bold occurrences of the site owner's name in an author string. */
function formatAuthors(str) {
  // Match "Lanyu Xu" with optional middle name/initial and surrounding context
  return str.replace(/Lanyu\s+(?:\(Lori\)\s+)?Xu/g, '<strong>$&</strong>');
}

/** Render a single publication entry. */
function renderPubEntry(entry) {
  const badge  = entry.badge
    ? ` <span class="pub-badge">${entry.badge}</span>` : '';
  const links  = (entry.links || []).map(l =>
    `<a href="${l.href}" class="pub-link" target="_blank">${l.label}</a>`
  ).join('');
  const linksHtml = links ? `<div class="pub-links">${links}</div>` : '';

  return `
    <div class="pub-entry">
      <p class="pub-title">${entry.title}${badge}</p>
      <p class="pub-authors">${formatAuthors(entry.authors)}</p>
      <p class="pub-venue">${entry.venue}</p>
      ${linksHtml}
    </div>`;
}

/** Render the full page. */
function renderSite() {
  const S = SITE;

  // ── Nav ────────────────────────────────────────────────────────────────
  document.getElementById('nav-inner').innerHTML = `
    <a href="#hero" class="nav-name">${S.name}</a>
    <ul class="nav-links">
      <li><a href="#news">News</a></li>
      <li><a href="#publications">Research</a></li>
      <li><a href="#lab">Lab</a></li>
      <li><a href="#teaching">Teaching</a></li>
      <li><a href="#service">Service</a></li>
    </ul>`;

  // ── Hero ───────────────────────────────────────────────────────────────
  const heroLinks = S.links.map(l => {
    const ext = l.external ? ' target="_blank"' : '';
    return `<a href="${l.href}" class="hero-link"${ext}>${l.label}</a>`;
  }).join('\n      ');

  // ── News ───────────────────────────────────────────────────────────────
  const newsItems = S.news.map(n => `
    <li class="news-item">
      <span class="news-date">${n.date}</span>
      <span class="news-text">${n.text}</span>
    </li>`).join('');

  // ── Publications ───────────────────────────────────────────────────────
  const pubGroups = S.publications.map(group => `
    <div class="pub-group">
      <div class="pub-group-label">${group.label}</div>
      ${group.entries.map(renderPubEntry).join('')}
    </div>`).join('');

  // ── Lab ────────────────────────────────────────────────────────────────
  const studentGroups = S.lab.students.map(sg => {
    const members = sg.members.map(m => {
      const nameHtml = m.href
        ? `<a href="${m.href}" target="_blank">${m.name}</a>` : m.name;
      return `<li>${nameHtml} — ${m.since}</li>`;
    }).join('');
    return `
    <div class="student-group">
      <p class="student-group-label">${sg.group}</p>
      <ul class="student-list">${members}</ul>
    </div>`;
  }).join('');

  // ── Awards ─────────────────────────────────────────────────────────────
  const awardItems = S.awards.map(a => `
    <li class="award-item">
      <span class="award-year">${a.year}</span>
      <span>${a.text}</span>
    </li>`).join('');

  // ── Teaching ───────────────────────────────────────────────────────────
  const teachingCards = S.teaching.map(c => `
    <div class="teaching-card">
      <p class="teaching-code">${c.code}</p>
      <p class="teaching-name">${c.name}</p>
      <p class="teaching-term">${c.term}</p>
    </div>`).join('');

  // ── Service ────────────────────────────────────────────────────────────
  const serviceCols = S.service.map(col => {
    const items = col.items.map(i => `<li>${i}</li>`).join('');
    return `
    <div class="service-col">
      <h3>${col.column}</h3>
      <ul class="service-list">${items}</ul>
    </div>`;
  }).join('');

  // ── Assemble main ──────────────────────────────────────────────────────
  document.getElementById('main-content').innerHTML = `

    <section id="hero">
      <div class="hero-text">
        <p class="hero-eyebrow">${S.title}</p>
        <h1 class="hero-name">${S.nameHtml}</h1>
        <p class="hero-bio">${S.bio}</p>
        <div class="hero-links">
          ${heroLinks}
        </div>
        <p class="hero-meta">${S.location}</p>
      </div>
      <img src="${S.photo}" alt="${S.name}" class="hero-photo" />
    </section>

    <section id="news">
      <p class="section-label">News</p>
      <ul class="news-list">${newsItems}</ul>
    </section>

    <section id="publications">
      <p class="section-label">Research &amp; Publications</p>
      ${pubGroups}
    </section>

    <section id="lab">
      <p class="section-label">Edge Intelligent System Lab</p>
      <p class="lab-intro">${S.lab.intro}</p>
      ${studentGroups}
    </section>

    <section id="awards">
      <p class="section-label">Awards &amp; Funding</p>
      <ul class="award-list">${awardItems}</ul>
    </section>

    <section id="teaching">
      <p class="section-label">Teaching</p>
      <div class="teaching-grid">${teachingCards}</div>
    </section>

    <section id="service">
      <p class="section-label">Service</p>
      <div class="service-grid">${serviceCols}</div>
    </section>`;

  // ── Footer ─────────────────────────────────────────────────────────────
  document.getElementById('site-footer').innerHTML = `
    <p>${S.name} · Oakland University · <a href="mailto:lxu@oakland.edu" style="color:var(--ink3)">lxu@oakland.edu</a></p>`;
}

renderSite();
</script>

  /* ─── Reset & Base ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --serif:        'EB Garamond', Georgia, serif;
    --sans:         'DM Sans', system-ui, sans-serif;
    --ink:          #1a1a18;
    --ink2:         #4a4a44;
    --ink3:         #888880;
    --rule:         #e0ddd6;
    --bg:           #fafaf7;
    --sidebar-bg:   #f2f0eb;
    --accent:       #2d5a3d;
    --accent-light: #e8f0eb;
    --link:         #1a3f5c;
    --sidebar-w:    268px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    display: flex;
    min-height: 100vh;
  }

  /* ─── Sidebar ─────────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--rule);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 2.5rem 1.75rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    scrollbar-width: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }

  .sidebar-photo {
    width: 170px;
    height: 170px;
    border-radius: 6px;
    object-fit: cover;
    display: block;
    margin: 0 auto;
    filter: grayscale(5%);
    border: 3px solid var(--rule);
  }

  .sidebar-name {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--ink);
    text-align: center;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .sidebar-position {
    font-size: 12.5px;
    color: var(--ink2);
    text-align: center;
    line-height: 1.6;
    margin-top: -0.5rem;
  }

  .sidebar-position strong {
    display: block;
    font-weight: 500;
    color: var(--ink);
  }

  .sidebar-hr {
    border: none;
    border-top: 1px solid var(--rule);
  }

  .sidebar-location {
    font-size: 12px;
    color: var(--ink3);
    line-height: 1.6;
    text-align: center;
  }

  /* Contact / social links */
  .sidebar-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .sidebar-links a {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    color: var(--ink2);
    text-decoration: none;
    padding: 3px 0;
    transition: color 0.15s;
  }

  .sidebar-links a:hover { color: var(--accent); }

  .sidebar-links .lnk-icon {
    width: 18px;
    text-align: center;
    font-size: 13px;
    flex-shrink: 0;
    color: var(--ink3);
  }

  /* Section nav */
  .sidebar-nav {
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid var(--rule);
  }

  .sidebar-nav ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .sidebar-nav a {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink3);
    text-decoration: none;
    padding: 5px 0;
    transition: color 0.15s;
  }

  .sidebar-nav a:hover { color: var(--accent); }

  /* ─── Main wrapper ────────────────────────────────────────────── */
  .main-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .main-content {
    flex: 1;
    max-width: 760px;
    padding: 3.5rem 3.5rem 2rem;
  }

  section {
    padding: 2.75rem 0;
    border-bottom: 1px solid var(--rule);
  }

  section:last-child { border-bottom: none; }

  /* ─── Section labels ──────────────────────────────────────────── */
  .section-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1.5rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--rule);
  }

  /* ─── About ───────────────────────────────────────────────────── */
  .about-text {
    font-size: 15.5px;
    color: var(--ink2);
    line-height: 1.85;
  }

  .about-text a {
    color: var(--link);
    text-underline-offset: 3px;
  }

  /* ─── News ────────────────────────────────────────────────────── */
  .news-list { list-style: none; }

  .news-item {
    display: grid;
    grid-template-columns: 76px 1fr;
    gap: 1rem;
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--rule);
    font-size: 14.5px;
  }

  .news-item:last-child { border-bottom: none; }

  .news-date {
    font-size: 12px;
    color: var(--ink3);
    font-weight: 500;
    padding-top: 2px;
    white-space: nowrap;
  }

  .news-text { color: var(--ink2); line-height: 1.6; }
  .news-text a { color: var(--link); text-underline-offset: 3px; }

  /* ─── Publications ────────────────────────────────────────────── */
  .pub-group { margin-bottom: 2.5rem; }
  .pub-group:last-child { margin-bottom: 0; }

  .pub-group-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1.2rem;
  }

  .pub-entry {
    padding: 0.9rem 0;
    border-bottom: 1px dotted var(--rule);
  }

  .pub-entry:last-child { border-bottom: none; }

  .pub-title {
    font-family: var(--serif);
    font-size: 1.0rem;
    line-height: 1.45;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 0.2rem;
  }

  .pub-authors {
    font-size: 13px;
    color: var(--ink3);
    margin-bottom: 0.15rem;
  }

  .pub-venue {
    font-size: 13px;
    color: var(--ink2);
    font-style: italic;
    margin-bottom: 0.3rem;
  }

  .pub-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .pub-link {
    font-size: 12px;
    color: var(--link);
    text-decoration: none;
    padding: 2px 8px;
    border: 1px solid #b8cfe0;
    border-radius: 3px;
    transition: all 0.12s;
  }

  .pub-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 3px;
    background: var(--accent-light);
    color: var(--accent);
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ─── Lab ─────────────────────────────────────────────────────── */
  .lab-intro {
    font-size: 15px;
    color: var(--ink2);
    line-height: 1.8;
    margin-bottom: 2rem;
  }

  .student-group { margin-bottom: 1.75rem; }
  .student-group:last-child { margin-bottom: 0; }

  .student-group-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.5rem;
  }

  .student-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .student-list li {
    font-size: 14.5px;
    color: var(--ink2);
    padding: 0.25rem 0;
    border-bottom: 1px solid var(--rule);
  }

  .student-list li:last-child { border-bottom: none; }
  .student-list a { color: var(--link); text-underline-offset: 3px; }

  /* ─── Awards ──────────────────────────────────────────────────── */
  .award-list { list-style: none; }

  .award-item {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 1rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--rule);
    font-size: 14.5px;
    color: var(--ink2);
  }

  .award-item:last-child { border-bottom: none; }

  .award-year {
    font-size: 12px;
    color: var(--ink3);
    font-weight: 500;
    padding-top: 2px;
  }

  /* ─── Teaching ────────────────────────────────────────────────── */
  .teaching-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    border-radius: 6px;
    overflow: hidden;
  }

  .teaching-card {
    background: white;
    padding: 0.9rem 1.1rem;
  }

  .teaching-code {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 0.2rem;
  }

  .teaching-name {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 0.1rem;
  }

  .teaching-term { font-size: 12px; color: var(--ink3); }

  /* ─── Service ─────────────────────────────────────────────────── */
  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.5rem;
  }

  .service-col h3 {
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--rule);
  }

    list-style: none;
    font-size: 13.5px;
    color: var(--ink2);
  }

  .service-list li { padding: 0.3rem 0; border-bottom: 1px solid var(--rule); }

  footer {
    padding: 1.5rem 3.5rem;
    border-top: 1px solid var(--rule);
    font-size: 12.5px;
    color: var(--ink3);
    max-width: 760px;

  /* ─── Mobile ──────────────────────────────────────────────────── */
  @media (max-width: 800px) {
    body { flex-direction: column; }

    .sidebar {
      width: 100%;
      min-width: 0;
      height: auto;
      position: static;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      padding: 1.25rem 1.5rem;
      gap: 1rem;
      border-right: none;
      border-bottom: 1px solid var(--rule);
    }

    .sidebar-photo { width: 72px; height: 72px; margin: 0; }
    .sidebar-nav   { display: none; }
    .sidebar-hr    { display: none; }

    .sidebar-name,
    .sidebar-position,
    .sidebar-location { text-align: left; }

    .main-content { padding: 1.5rem; }
    .service-grid { grid-template-columns: 1fr; }
  }
</style>

/** Bold occurrences of the site owner's name in an author string. */
function formatAuthors(str) {
  return str.replace(/Lanyu\s+(?:\(Lori\)\s+)?Xu/g, '<strong>$&</strong>');
}

/** Render a single publication entry. */
function renderPubEntry(entry) {
  const badge   = entry.badge
    ? `<span class="pub-badge">${entry.badge}</span>` : '';
  const links   = (entry.links || []).map(l =>
    `<a href="${l.href}" class="pub-link" target="_blank">${l.label}</a>`
  ).join('');
  const linksHtml = links ? `<div class="pub-links">${links}</div>` : '';

  return `
    <div class="pub-entry">
      <p class="pub-title">${entry.title} ${badge}</p>
      <p class="pub-authors">${formatAuthors(entry.authors)}</p>
      <p class="pub-venue">${entry.venue}</p>
      ${linksHtml}
    </div>`;
}

/** Render the full page. */
function renderSite() {
  const S = SITE;

  // ── Sidebar ────────────────────────────────────────────────────────────
  const linkItems = S.links.map(l => {
    const ext = l.external ? ' target="_blank" rel="noopener"' : '';
    return `<li>
      <a href="${l.href}"${ext}>
        <span class="lnk-icon">${l.icon}</span>${l.label}
      </a></li>`;
  }).join('');

  document.getElementById('sidebar').innerHTML = `
    <img src="${S.photo}" alt="${S.name}" class="sidebar-photo" />
    <p class="sidebar-name">${S.name}</p>
    <p class="sidebar-position">
      <strong>${S.title}</strong>
      ${S.org}
    </p>
    <p class="sidebar-location">${S.location}</p>
    <hr class="sidebar-hr" />
    <ul class="sidebar-links">${linkItems}</ul>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#news">News</a></li>
        <li><a href="#publications">Research</a></li>
        <li><a href="#lab">Lab</a></li>
        <li><a href="#awards">Funding</a></li>
        <li><a href="#teaching">Teaching</a></li>
        <li><a href="#service">Service</a></li>
      </ul>
    </nav>`;

  // ── News ───────────────────────────────────────────────────────────────
  const newsItems = S.news.map(n => `
    <li class="news-item">
      <span class="news-date">${n.date}</span>
      <span class="news-text">${n.text}</span>
    </li>`).join('');

  // ── Publications ───────────────────────────────────────────────────────
  const pubGroups = S.publications.map(group => `
    <div class="pub-group">
      <div class="pub-group-label">${group.label}</div>
      ${group.entries.map(renderPubEntry).join('')}
    </div>`).join('');

  // ── Lab ────────────────────────────────────────────────────────────────
  const studentGroups = S.lab.students.map(sg => {
    const members = sg.members.map(m => {
      const nameHtml = m.href
        ? `<a href="${m.href}" target="_blank">${m.name}</a>` : m.name;
      return `<li>${nameHtml} <span style="color:var(--ink3); font-size:12.5px;">— ${m.since}</span></li>`;
    }).join('');
    return `
    <div class="student-group">
      <p class="student-group-label">${sg.group}</p>
      <ul class="student-list">${members}</ul>
    </div>`;
  }).join('');

  // ── Awards ─────────────────────────────────────────────────────────────
  const awardItems = S.awards.map(a => `
    <li class="award-item">
      <span class="award-year">${a.year}</span>
      <span>${a.text}</span>
    </li>`).join('');

  // ── Teaching ───────────────────────────────────────────────────────────
  const teachingCards = S.teaching.map(c => `
    <div class="teaching-card">
      <p class="teaching-code">${c.code}</p>
      <p class="teaching-name">${c.name}</p>
      <p class="teaching-term">${c.term}</p>
    </div>`).join('');

  // ── Service ────────────────────────────────────────────────────────────
  const serviceCols = S.service.map(col => {
    const items = col.items.map(i => `<li>${i}</li>`).join('');
    return `
    <div class="service-col">
      <h3>${col.column}</h3>
      <ul class="service-list">${items}</ul>
    </div>`;
  }).join('');

  // ── Assemble main ──────────────────────────────────────────────────────
  document.getElementById('main-content').innerHTML = `

    <section id="about">
      <p class="section-label">About</p>
      <p class="about-text">${S.bio}</p>
    </section>

    <section id="news">
      <p class="section-label">News</p>
      <ul class="news-list">${newsItems}</ul>
    </section>

    <section id="publications">
      <p class="section-label">Research &amp; Publications</p>
      ${pubGroups}
    </section>

    <section id="lab">
      <p class="section-label">Edge Intelligent System Lab</p>
      <p class="lab-intro">${S.lab.intro}</p>
      ${studentGroups}
    </section>

    <section id="awards">
      <p class="section-label">Awards &amp; Funding</p>
      <ul class="award-list">${awardItems}</ul>
    </section>

    <section id="teaching">
      <p class="section-label">Teaching</p>
      <div class="teaching-grid">${teachingCards}</div>
    </section>

    <section id="service">
      <p class="section-label">Service</p>
      <div class="service-grid">${serviceCols}</div>
    </section>`;

  // ── Footer ─────────────────────────────────────────────────────────────
  document.getElementById('site-footer').innerHTML = `
    <p>${S.name} · ${S.org} · <a href="mailto:lxu@oakland.edu">lxu@oakland.edu</a></p>`;
}

renderSite();
</script>
